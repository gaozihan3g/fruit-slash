name: Build desktop releases

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v1.0.2
        required: true
        default: v1.0.2
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            slug: windows-x64
            archive: Fruit-Slash-Windows-x64.zip
            checksum: Fruit-Slash-Windows-x64.zip.sha256
          - name: macOS Intel
            os: macos-15-intel
            slug: macos-intel
            expected_arch: x86_64
            archive: Fruit-Slash-macOS-Intel.zip
            checksum: Fruit-Slash-macOS-Intel.zip.sha256
          - name: macOS Apple Silicon
            os: macos-15
            slug: macos-arm64
            expected_arch: arm64
            archive: Fruit-Slash-macOS-Apple-Silicon.zip
            checksum: Fruit-Slash-macOS-Apple-Silicon.zip.sha256
          - name: Linux x64
            os: ubuntu-24.04
            slug: linux-x64
            archive: Fruit-Slash-Linux-x64.tar.gz
            checksum: Fruit-Slash-Linux-x64.tar.gz.sha256

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name Fruit-Slash main.py
          $env:SDL_VIDEODRIVER = "dummy"
          $env:SDL_AUDIODRIVER = "dummy"
          $process = Start-Process -FilePath "dist/Fruit-Slash.exe" -ArgumentList "--smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) { exit $process.ExitCode }
          Compress-Archive -Path "dist/Fruit-Slash.exe" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File "${{ matrix.checksum }}" -Encoding ascii

      - name: Build macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --noconfirm --clean --windowed \
            --name "Fruit Slash" \
            --osx-bundle-identifier "io.github.gaozihan3g.fruit-slash" \
            main.py
          lipo -archs "dist/Fruit Slash.app/Contents/MacOS/Fruit Slash" \
            | grep -qw "${{ matrix.expected_arch }}"
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            "dist/Fruit Slash.app/Contents/MacOS/Fruit Slash" --smoke-test
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Fruit Slash.app" "${{ matrix.archive }}"
          shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.checksum }}"

      - name: Build Linux executable
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          pyinstaller --noconfirm --clean --onefile --windowed --name Fruit-Slash main.py
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            "dist/Fruit-Slash" --smoke-test
          tar -czf "${{ matrix.archive }}" -C dist Fruit-Slash
          sha256sum "${{ matrix.archive }}" > "${{ matrix.checksum }}"

      - name: Upload packaged application
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.slug }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.checksum }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Download packaged applications
        uses: actions/download-artifact@v7
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* \
              --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Fruit Slash $RELEASE_TAG" \
              --notes "Unsigned desktop builds for Windows x64, macOS Intel, macOS Apple Silicon, and Linux x64. SHA-256 checksum files are included for every download."
          fi
